<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generating Your Design</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f9fafb;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            color: #111827;
            font-size: 1.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        p {
            color: #6b7280;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .loading {
            display: inline-block;
            position: relative;
            width: 64px;
            height: 64px;
            margin-bottom: 2rem;
        }

        .loading:after {
            content: '';
            display: block;
            border-radius: 50%;
            width: 100%;
            height: 100%;
            border: 6px solid #10a37f;
            border-color: #10a37f transparent #10a37f transparent;
            animation: loading 1.2s linear infinite;
        }

        @keyframes loading {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading"></div>
        <h1>Generating Your Mobile UI Design</h1>
        <p>Please wait while our AI model creates a custom design based on your requirements. This may take a few moments.</p>
    </div>
</body>
</html>
